#      host: ${redis.host}
#      database: ${redis.database}

# jwt 토큰 사용을 위한 비밀키
jwt:
  secret:
    key: ${jwt.key}
  token:
    prefix: ${jwt.prefix}
    expiration: ${jwt.expiration}

