spring:
  datasource:
    url: jdbc:mysql://${db.url}:${db.port}/${db.name}
    username: ${db.user}
    password: ${db.pw}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  config:
    import: myinfo.yml
  data:
    redis:
      port: ${redis.port}
      host: ${redis.host}
      database: ${redis.database}

# jwt 토큰 사용을 위한 비밀키
jwt:
  secret:
    key: ${jwt.key}
  token:
    prefix: ${jwt.prefix}
    refreshPrefix: ${jwt.refreshPrefix}
    expiration: ${jwt.expiration}
    refreshExpiration: ${jwt.refreshExpiration}

#logging:
#  level:
#    org:
#      springframework:
#        security=DEBUG:

security:
  bcrypt:
    cost: ${security.cost}

