spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_URL}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL}

  data:
    redis:
      port: ${REDIS_PORT}
      host: ${REDIS_HOST}
      database: ${REDIS_DATABASE}
      ssl:
        enabled: true

elasticsearch:
  uris: ${ELASTICSEARCH_HOST}:${ELASTICSEARCH_PORT}  # Elasticsearch REST API URL
  username: ${ELASTICSEARCH_USERNAME}
  password: ${ELASTICSEARCH_PASSWORD}
  index:
    name: job-opening

redis:
  uris: ${REDIS_RELEASE_URI}

jwt:
  secret:
    aesKey: ${AES_KEY}
    key: ${JWT_KEY}
    whitelist:
      - /auth/signup
      - /auth/signup-verify
      - /auth/login
      - /actuator/health
      - /actuator/prometheus
      - /users/email-verification/send-password-reset-verify
      - /users/email-verification/password-reset-verify
      - /users/password/reset
      - /auth/refresh
  token:
    prefix: ${JWT_PREFIX}
    refreshPrefix: ${REFRESH_PREFIX}
    blackListPrefix: ${BLACK_PREFIX}
    expiration: ${JWT_EXPIRATION}
    refreshExpiration: ${REFRESH_EXPIRATION}
    blackListExpiration: ${BLACK_EXPIRATION}

security:
  bcrypt:
    cost: ${SECURITY_COST}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    elasticsearch:
      enabled: false

server:
  ssl:
    enabled: false
  port: 8080

