spring:
  config:
    import: optional:file:.env[.properties]  # .env 파일 로드
  datasource:
    url: jdbc:mysql://localhost:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL}

  data:
    redis:
      port: ${REDIS_PORT}
      host: localhost
      database: ${REDIS_DATABASE}

elasticsearch:
  uris: http://localhost:${ELASTICSEARCH_PORT}  # Elasticsearch REST API URL
  username: ${ELASTICSEARCH_USERNAME}
  password: ${ELASTICSEARCH_PASSWORD}
  index:
    name: job-opening

redis:
  uris: ${REDIS_DEV_URI}

jwt:
  secret:
    aesKey: ${AES_KEY}
    key: ${JWT_KEY}
    whitelist:
      - /auth/signup
      - /auth/signup-verify
      - /auth/login
      - /actuator/health
      - /actuator/prometheus
      - /users/email-verification/send-password-reset-verify
      - /users/email-verification/password-reset-verify
      - /users/password/reset
      - /auth/refresh
  token:
    prefix: ${JWT_PREFIX}
    refreshPrefix: ${REFRESH_PREFIX}
    blackListPrefix: ${BLACK_PREFIX}
    expiration: ${JWT_EXPIRATION}
    refreshExpiration: ${REFRESH_EXPIRATION}
    blackListExpiration: ${BLACK_EXPIRATION}

security:
  bcrypt:
    cost: ${SECURITY_COST}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    elasticsearch:
      enabled: false

logging:
  level:
    tracer: TRACE
    org:
      hibernate:
        SQL: debug
        orm:
          jdbc:
            bind: trace