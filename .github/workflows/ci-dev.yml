name: cheer-ha Dev CI Pipeline

on:
  push:
    branches: [dev, ci/setup]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Run Java Linter
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            gradle-

      - name: Chmod gradlew
        run: sudo chmod +x ./gradlew

      - name: Build with Gradle (Check Build-Logs)
        run: ./gradlew build --parallel --daemon --max-workers=2 -x test --info | tee build-log.txt

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: build-log.txt

      - name: PR Quality Gate #빌드 실패 시 머지 차단
        if: failure()
        run: |
          echo "❌ Build failed. Check the logs in GitHub Actions." > build-failure.log
          cat build-log.txt >> build-failure.log
          exit 1

      - name: Upload Failure Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: build-failure.log
