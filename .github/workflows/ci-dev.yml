name: cheer-ha Dev CI Pipeline

on:
  push:
    branches: [empty] #테스트용으로 비워 둠
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            gradle-

      - name: Chmod gradlew
        run: sudo chmod +x ./gradlew

      - name: Run Tests and Generate Coverage Report
        run: |
          ./gradlew test jacocoTestReport --parallel --daemon --max-workers=2 --info | tee test-log.txt

      - name: Upload Test Logs
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-log.txt

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: PR Quality Gate #빌드 실패 시 머지 차단
        if: failure()
        run: |
          echo "❌ Build failed. Check the logs in GitHub Actions." > build-failure.log
          cat build-log.txt >> build-failure.log
          exit 1

      - name: Upload Failure Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs
          path: test-failure.log