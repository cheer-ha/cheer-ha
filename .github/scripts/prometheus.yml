global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'cheer-ha-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [':8080']  #main application private ip
  - job_name: 'node_exporter'
    static_configs:
      - targets: [':9100']
  - job_name: 'mysqld_exporter'
    static_configs:
      - targets: [':9104']
  - job_name: 'redis_exporter'
    static_configs:
      - targets: [':9121']