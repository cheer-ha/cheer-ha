<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>
<match springboot.**>
  @type elasticsearch
  hosts 주소
  user elastic
  password 비번
  # SSL/TLS 설정
  scheme https
  ssl_verify true
  # 인덱스 설정
  logstash_format true
  logstash_prefix springboot
  index_name springboot
  type_name log
  # 기타 설정
  include_tag_key true
  tag_key @log_name
  flush_interval 5s
  # 버퍼 설정
  <buffer>
    @type memory
    flush_thread_count 4
    flush_interval 5s
    chunk_limit_size 8M
    queue_limit_length 32
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>
<system>
  log_level info
</system>