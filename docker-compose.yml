services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cheer-ha-app
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    env_file: .env

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cheer-ha-app2
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "8081:8080"
    env_file: .env

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data:
