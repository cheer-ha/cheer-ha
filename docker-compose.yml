services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cheer-ha-app
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    env_file: .env

  mysql:
    image: mysql:8.0
    container_name: ${DB_URL}
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: ${REDIS_HOST}
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
